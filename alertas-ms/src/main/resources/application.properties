# =============================================
# SERVIDOR
# =============================================
server.port=${SERVER_PORT:8081}
spring.application.name=alertas-ms

# =============================================
# ORACLE DB CON WALLET
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@XXXXX?TNS_ADMIN=src/main/resources/Wallet_XXXX}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ADMIN}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:XXXX}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false



management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
