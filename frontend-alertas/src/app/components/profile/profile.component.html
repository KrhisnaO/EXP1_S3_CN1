<section class="panel">
  <h2>Mi perfil</h2>

  @if (error) {
    <div class="error">{{ error }}</div>
  }

  @if (account) {
    <div class="profile-card">
      <div class="avatar">{{ (account.name || 'U').charAt(0).toUpperCase() }}</div>
      <div class="profile-info">
        <h3>{{ account.name }}</h3>
        <p class="email">{{ account.username }}</p>
      </div>
    </div>

    <h3>Datos</h3>
    <div class="claims-table">
      @if (perfil) {
        <div class="claim-row">
          <span class="claim-key">Nombre</span>
          <span class="claim-val">{{ perfil.nombre }}</span>
        </div>
        <div class="claim-row">
          <span class="claim-key">Email</span>
          <span class="claim-val">{{ perfil.email }}</span>
        </div>
      } @else {
        <p>Cargando datos...</p>
      }
    </div>

  }
</section>
